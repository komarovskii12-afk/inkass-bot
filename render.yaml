# Инфраструктура для Render. Импортируй репозиторий как Blueprint,
# Render создаст веб-сервис и базу PostgreSQL автоматически.
services:
  - type: web
    name: inkass-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      # Важно: на Python 3.14 нет готовых сборок pydantic-core для aiogram 3.13,
      # pip пытается компилировать из исходников и падает. Закрепляем 3.12.
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WORKER_IDS
        sync: false
      - key: TIMEZONE
        value: Europe/Moscow
      - key: DEFAULT_POINTS
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      # Внешний адрес сервиса бот берёт из RENDER_EXTERNAL_URL (Render ставит сам).
      # Строка подключения к внешней базе (Neon) — вставляется вручную в панели,
      # т.к. содержит пароль и не должна попадать в репозиторий.
      - key: DATABASE_URL
        sync: false
